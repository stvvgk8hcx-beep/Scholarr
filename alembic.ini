# Alembic Configuration File
# This file contains the configuration for database migrations.

[alembic]
# path to migration scripts
script_location = scholarr/db/migrations

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field of the migration file (impact file name length)
# use the below value to set an arbitrary length
# len_identifier_range = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_process = false

# set to 'false' to skip the signature files
# revision_file_signature = true

# Logging configuration
[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[sqlalchemy]
# the 'sqlalchemy.url' setting is important. With this setting alembic can
# now be used with different databases than what the environment is currently
# configured for.  This line sets the URL of the database to migrate.
#
# For PostgreSQL:
# sqlalchemy.url = postgresql+asyncpg://user:password@localhost/scholarr
#
# For SQLite:
# sqlalchemy.url = sqlite+aiosqlite:///./scholarr.db
#
# The sqlalchemy.url_placeholder setting is used with pre_write_process_revision_file
# to prepend a new revision file with a raw string password that you may want the
# migration environment to read from a file when the revision file
# is executed.  A raw string "is" the result of calling str() and concatenating
# the prefix and the env var.  set to "true" if this is desirable.
#
# sqlalchemy.url_placeholder = ${SQLALCHEMY_URL}
#
# use the environments from operator.env to populate
# the 'sqlalchemy.url' value
#
use_env = true
