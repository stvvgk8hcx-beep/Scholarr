{% extends "layouts/base.html" %}

{% block title %}Notes{% endblock %}
{% block page_title %}Class Notes{% endblock %}

{% block extra_css %}
<style>
.notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
}
.note-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 18px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
    position: relative;
}
.note-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.note-card.pinned { border-left: 3px solid var(--accent); }
.note-title { font-weight: 600; font-size: 0.95em; margin-bottom: 8px; color: var(--text-primary); }
.note-preview { font-size: 0.82em; color: var(--text-secondary); line-height: 1.5; max-height: 60px; overflow: hidden; }
.note-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 0.75em; color: var(--text-muted); }
.note-course-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 0.72em;
    font-weight: 600;
    background: var(--accent-dim);
    color: var(--accent);
}
</style>
{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;gap:16px;">

    <!-- Header actions -->
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;gap:10px;align-items:center;flex:1;min-width:200px;">
            <input type="text" id="note-search" placeholder="Search notes..." oninput="debouncedLoad()" style="flex:1;max-width:320px;">
            <select id="note-course-filter" onchange="loadNotes()" style="max-width:200px;">
                <option value="">All Courses</option>
            </select>
        </div>
        <button class="btn" onclick="openNewNoteModal()">New Note</button>
    </div>

    <!-- Stats -->
    <div style="display:flex;gap:12px;">
        <div class="stat-card" style="flex:1;padding:10px 16px;">
            <div class="stat-label">Total Notes</div>
            <div class="stat-value" id="notes-total">—</div>
        </div>
        <div class="stat-card" style="flex:1;padding:10px 16px;">
            <div class="stat-label">Total Writing Time</div>
            <div class="stat-value" id="notes-time">—</div>
        </div>
    </div>

    <!-- Notes grid -->
    <div class="notes-grid" id="notes-grid">
        <div class="loading" style="grid-column:1/-1;text-align:center;padding:40px;">Loading notes...</div>
    </div>
    <div id="notes-pagination" style="display:flex;justify-content:center;gap:8px;margin-top:8px;"></div>
</div>

<!-- New Note Modal -->
<div id="newNoteModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;padding:24px;width:440px;max-width:95vw;">
        <h3 style="margin-bottom:16px;font-size:1em;">New Note</h3>
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="new-note-title" placeholder="Lecture notes, study session...">
        </div>
        <div class="form-group">
            <label>Course (optional)</label>
            <select id="new-note-course" style="width:100%;">
                <option value="">No course</option>
            </select>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
            <button class="btn btn-secondary" onclick="document.getElementById('newNoteModal').style.display='none'">Cancel</button>
            <button class="btn" onclick="createNote()">Start Writing</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let notePage = 1;
const NOTE_PAGE_SIZE = 30;
let debounceTimer = null;

document.addEventListener('DOMContentLoaded', () => { loadNotes(); loadCourseFilters(); });

function debouncedLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { notePage = 1; loadNotes(); }, 250);
}

function goToNotePage(p) { notePage = p; loadNotes(); }

async function loadCourseFilters() {
    try {
        const courses = await API.get('/api/v1/courses');
        const opts = (Array.isArray(courses) ? courses : []).map(c =>
            `<option value="${c.id}">${c.code} - ${c.name}</option>`
        ).join('');
        document.getElementById('note-course-filter').innerHTML = '<option value="">All Courses</option>' + opts;
        document.getElementById('new-note-course').innerHTML = '<option value="">No course</option>' + opts;
    } catch(e) { console.error(e); }
}

async function loadNotes() {
    const search = document.getElementById('note-search').value.trim();
    const courseId = document.getElementById('note-course-filter').value;
    let url = `/api/v1/notes?page=${notePage}&page_size=${NOTE_PAGE_SIZE}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (courseId) url += `&course_id=${courseId}`;

    try {
        const data = await API.get(url);
        const notes = data.items || [];
        document.getElementById('notes-total').textContent = data.total;
        const totalSecs = notes.reduce((a, n) => a + (n.duration_seconds || 0), 0);
        const hrs = Math.floor(totalSecs / 3600);
        const mins = Math.floor((totalSecs % 3600) / 60);
        document.getElementById('notes-time').textContent = hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;

        const grid = document.getElementById('notes-grid');
        if (!notes.length) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-secondary);"><div style="font-size:1.1em;margin-bottom:8px;">No notes yet</div><div style="font-size:0.85em;">Create your first note to start a distraction-free writing session.</div></div>';
            document.getElementById('notes-pagination').innerHTML = '';
            return;
        }

        grid.innerHTML = notes.map(n => {
            const preview = (n.content || '').replace(/<[^>]*>/g, '').slice(0, 120);
            const words = n.word_count || 0;
            const mins = Math.round((n.duration_seconds || 0) / 60);
            return `
                <div class="note-card${n.pinned ? ' pinned' : ''}" onclick="window.location.href='/notes/${n.id}'">
                    <div style="position:absolute;top:8px;right:8px;display:flex;gap:4px;" onclick="event.stopPropagation()">
                        <button style="background:transparent;border:none;cursor:pointer;color:${n.pinned ? 'var(--accent)' : 'var(--text-muted)'};font-size:0.85em;padding:2px 4px;" onclick="togglePin(${n.id},${!n.pinned})" title="${n.pinned ? 'Unpin' : 'Pin'}">${n.pinned ? 'Pinned' : 'Pin'}</button>
                        <button style="background:transparent;border:none;cursor:pointer;color:var(--text-muted);font-size:0.85em;padding:2px 4px;" onclick="deleteNote(${n.id})" title="Delete">Del</button>
                    </div>
                    <div class="note-title">${n.title}</div>
                    ${n.course_code ? `<span class="note-course-badge">${n.course_code}</span>` : ''}
                    <div class="note-preview">${preview || 'Empty note'}</div>
                    <div class="note-meta">
                        <span>${words} words${mins > 0 ? ' · ' + mins + 'm' : ''}</span>
                        <span>${formatRelativeTime(n.updated_at)}</span>
                    </div>
                </div>
            `;
        }).join('');

        window.renderPagination(data.total, NOTE_PAGE_SIZE, notePage, 'goToNotePage', 'notes-pagination');
    } catch(e) {
        document.getElementById('notes-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--danger);">Error: ${e.message}</div>`;
    }
}

function openNewNoteModal() {
    document.getElementById('new-note-title').value = '';
    document.getElementById('newNoteModal').style.display = 'flex';
    setTimeout(() => document.getElementById('new-note-title').focus(), 50);
}

async function createNote() {
    const title = document.getElementById('new-note-title').value.trim();
    if (!title) { showToast('Enter a title', 'warning'); return; }
    const courseId = document.getElementById('new-note-course').value;
    try {
        const note = await API.post('/api/v1/notes', {
            title,
            course_id: courseId ? parseInt(courseId) : null,
        });
        document.getElementById('newNoteModal').style.display = 'none';
        window.location.href = `/notes/${note.id}`;
    } catch(e) {
        showToast('Error: ' + e.message, 'error');
    }
}

async function deleteNote(id) {
    if (!confirm('Delete this note? This cannot be undone.')) return;
    try {
        await API.del(`/api/v1/notes/${id}`);
        showToast('Note deleted', 'success');
        loadNotes();
    } catch(e) {
        showToast('Error: ' + e.message, 'error');
    }
}

async function togglePin(id, pinned) {
    try {
        await API.put(`/api/v1/notes/${id}`, { pinned });
        loadNotes();
    } catch(e) {
        showToast('Error: ' + e.message, 'error');
    }
}
</script>
{% endblock %}
