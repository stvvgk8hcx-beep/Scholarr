{% extends "layouts/base.html" %}

{% block title %}Semesters - Scholarr{% endblock %}

{% block page_title %}Semesters{% endblock %}

{% block header_actions %}
<button class="btn btn-small" onclick="openAddSemesterModal()">Add Semester</button>
{% endblock %}

{% block content %}
<style>
    .semester-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    .semester-card {
        background-color: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 20px;
        transition: all 0.2s;
    }

    .semester-card:hover {
        border-color: var(--accent-blue);
        box-shadow: 0 2px 8px rgba(13, 125, 216, 0.1);
    }

    .semester-card h3 {
        font-size: 1.3em;
        margin-bottom: 10px;
        color: var(--accent-blue);
    }

    .semester-info {
        color: var(--text-secondary);
        font-size: 0.9em;
        margin-bottom: 15px;
    }

    .semester-info-row {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
    }

    .semester-info-label {
        font-weight: 500;
    }

    .semester-actions {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid var(--border-color);
    }

    .semester-badge-active {
        display: inline-block;
        background-color: var(--status-complete);
        color: white;
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 0.8em;
        font-weight: 600;
        margin-left: auto;
    }

    .semester-courses {
        background-color: var(--bg-tertiary);
        padding: 10px;
        border-radius: 3px;
        margin-bottom: 10px;
        text-align: center;
    }

    .semester-courses-count {
        font-weight: 600;
        color: var(--accent-blue);
    }
</style>

<!-- Semesters Grid -->
<div id="semestersContainer">
    <div class="semester-grid" id="semestersList">
        <!-- Loaded via HTMX -->
        <p class="text-muted" style="grid-column: 1/-1; text-align: center; padding: 40px;">
            Loading semesters... <span class="htmx-request"></span>
        </p>
    </div>
</div>

<!-- Add Semester Modal -->
<div id="addSemesterModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Add New Semester</h2>
            <button class="modal-close" onclick="closeAddSemesterModal()">&times;</button>
        </div>
        <form id="addSemesterForm" 
              hx-post="/api/v1/semesters/"
              hx-target="#semestersList"
              hx-swap="afterbegin"
              hx-on::after-swap="closeAddSemesterModal(); reloadSemesters()"
              onsubmit="return false;">
            
            <div class="form-group">
                <label for="semesterName">Name *</label>
                <input type="text" id="semesterName" name="name" required placeholder="e.g., Spring 2024">
            </div>

            <div class="form-group">
                <label for="semesterStart">Start Date *</label>
                <input type="date" id="semesterStart" name="start_date" required>
            </div>

            <div class="form-group">
                <label for="semesterEnd">End Date *</label>
                <input type="date" id="semesterEnd" name="end_date" required>
            </div>

            <div class="form-group">
                <label for="semesterActive">
                    <input type="checkbox" id="semesterActive" name="active"> Set as Active
                </label>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeAddSemesterModal()">Cancel</button>
                <button type="submit" class="btn">Create Semester</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Semester Modal -->
<div id="editSemesterModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Edit Semester</h2>
            <button class="modal-close" onclick="closeEditSemesterModal()">&times;</button>
        </div>
        <form id="editSemesterForm" 
              hx-put=""
              hx-target="closest .semester-card"
              hx-swap="outerHTML"
              hx-on::after-swap="closeEditSemesterModal(); reloadSemesters()"
              onsubmit="return false;">
            
            <div class="form-group">
                <label for="editSemesterName">Name *</label>
                <input type="text" id="editSemesterName" name="name" required>
            </div>

            <div class="form-group">
                <label for="editSemesterStart">Start Date *</label>
                <input type="date" id="editSemesterStart" name="start_date" required>
            </div>

            <div class="form-group">
                <label for="editSemesterEnd">End Date *</label>
                <input type="date" id="editSemesterEnd" name="end_date" required>
            </div>

            <div class="form-group">
                <label for="editSemesterActive">
                    <input type="checkbox" id="editSemesterActive" name="active"> Set as Active
                </label>
            </div>

            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeEditSemesterModal()">Cancel</button>
                <button type="submit" class="btn">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Load semesters on page load
    document.addEventListener('DOMContentLoaded', function() {
        reloadSemesters();
    });

    function reloadSemesters() {
        htmx.ajax('GET', '/api/v1/semesters/', {
            target: '#semestersList',
            swap: 'innerHTML'
        });
    }

    function openAddSemesterModal() {
        document.getElementById('addSemesterModal').classList.add('show');
    }

    function closeAddSemesterModal() {
        document.getElementById('addSemesterModal').classList.remove('show');
        document.getElementById('addSemesterForm').reset();
    }

    function closeEditSemesterModal() {
        document.getElementById('editSemesterModal').classList.remove('show');
    }

    function openEditSemesterModal(semesterId) {
        // Fetch semester data and populate form
        fetch(`/api/v1/semesters/${semesterId}`)
            .then(r => r.json())
            .then(data => {
                document.getElementById('editSemesterName').value = data.name;
                document.getElementById('editSemesterStart').value = data.start_date;
                document.getElementById('editSemesterEnd').value = data.end_date;
                document.getElementById('editSemesterActive').checked = data.active;
                document.getElementById('editSemesterForm').setAttribute('hx-put', `/api/v1/semesters/${semesterId}`);
                document.getElementById('editSemesterModal').classList.add('show');
            });
    }

    function setActiveSemester(semesterId) {
        // Only this semester should be active
        htmx.ajax('PUT', `/api/v1/semesters/${semesterId}`, {
            body: JSON.stringify({ active: true }),
            values: { active: true },
            swap: 'none',
            onload: function() {
                reloadSemesters();
            }
        });
    }

    function deleteSemester(semesterId) {
        if (confirm('Are you sure you want to delete this semester? All associated courses will remain.')) {
            htmx.ajax('DELETE', `/api/v1/semesters/${semesterId}`, {
                target: `[data-semester-id="${semesterId}"]`,
                swap: 'outerHTML swap:1s',
                onload: function() {
                    reloadSemesters();
                }
            });
        }
    }

    // Close modals when clicking outside
    document.getElementById('addSemesterModal').addEventListener('click', function(e) {
        if (e.target === this) closeAddSemesterModal();
    });

    document.getElementById('editSemesterModal').addEventListener('click', function(e) {
        if (e.target === this) closeEditSemesterModal();
    });
</script>
{% endblock %}
