{% extends "layouts/base.html" %}

{% block title %}Courses{% endblock %}
{% block page_title %}Courses{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;gap:16px;">

    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;">
        <h2 style="font-size:1.4em;font-weight:700;color:var(--text-primary);">All Courses</h2>
        <a href="/courses/add" class="btn">Add Course</a>
    </div>

    <!-- Filters -->
    <div style="background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:4px;padding:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;">
        <div class="form-group" style="flex:2;min-width:180px;margin-bottom:0;">
            <label>Search</label>
            <input type="text" id="course-search" placeholder="Search by code, name, professor..." oninput="debouncedLoad()">
        </div>
        <div class="form-group" style="flex:1;min-width:150px;margin-bottom:0;">
            <label>Semester</label>
            <select id="semester-filter" onchange="loadCourses()">
                <option value="">All Semesters</option>
            </select>
        </div>
        <div class="form-group" style="min-width:140px;margin-bottom:0;">
            <label>&nbsp;</label>
            <label style="display:flex;align-items:center;gap:8px;padding:8px;cursor:pointer;">
                <input type="checkbox" id="monitored-only" onchange="loadCourses()">
                Monitored Only
            </label>
        </div>
        <div style="display:flex;gap:6px;align-items:flex-end;">
            <button class="btn btn-secondary btn-small" onclick="setSortAndLoad('name','asc')">A–Z</button>
            <button class="btn btn-secondary btn-small" onclick="setSortAndLoad('created_at','desc')">Newest</button>
        </div>
    </div>

    <!-- Table -->
    <div class="table-container" id="courses-container">
        <table>
            <thead>
                <tr>
                    <th onclick="setSortAndLoad('code','asc')" style="cursor:pointer;">Code ⇅</th>
                    <th onclick="setSortAndLoad('name','asc')" style="cursor:pointer;">Name ⇅</th>
                    <th>Professor</th>
                    <th>Semester</th>
                    <th>Items</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="courses-tbody">
                <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-secondary);">Loading courses...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div id="courses-pagination" style="display:flex;justify-content:center;gap:8px;margin-top:4px;"></div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
let courseSortKey = 'name';
let courseSortDir = 'asc';
let coursePage = 1;
const PAGE_SIZE = 20;
let debounceTimer = null;

document.addEventListener('DOMContentLoaded', function() {
    loadSemesterFilter();
    loadCourses();
});

function setSortAndLoad(key, dir) {
    courseSortKey = key;
    courseSortDir = dir;
    coursePage = 1;
    loadCourses();
}

function debouncedLoad() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => loadCourses(), 400);
}

async function loadSemesterFilter() {
    try {
        const semesters = await API.get('/api/v1/semesters');
        const sel = document.getElementById('semester-filter');
        (Array.isArray(semesters) ? semesters : []).forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.id;
            opt.textContent = s.name;
            sel.appendChild(opt);
        });
    } catch(e) { /* no semesters yet */ }
}

async function loadCourses() {
    const search = document.getElementById('course-search').value.trim();
    const semId = document.getElementById('semester-filter').value;
    const monitored = document.getElementById('monitored-only').checked;

    let url = `/api/v1/courses/paged?page=${coursePage}&page_size=${PAGE_SIZE}&sort_key=${courseSortKey}&sort_dir=${courseSortDir}`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    if (semId) url += `&semester_id=${semId}`;
    if (monitored) url += `&monitored=true`;

    const tbody = document.getElementById('courses-tbody');
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text-secondary);">Loading...</td></tr>';

    try {
        const data = await API.get(url);
        const items = Array.isArray(data) ? data : (data.items || []);
        const total = data.total || items.length;

        if (!items.length) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-secondary);">No courses found. <a href="/courses/add" style="color:var(--accent-blue);">Add one →</a></td></tr>';
            document.getElementById('courses-pagination').innerHTML = '';
            return;
        }

        tbody.innerHTML = items.map(c => `
            <tr onclick="window.location='/courses/${c.id}'" style="cursor:pointer;">
                <td><span style="font-family:monospace;font-weight:600;color:var(--accent-blue);">${esc(c.code)}</span></td>
                <td>${esc(c.name)}</td>
                <td style="color:var(--text-secondary);">${esc(c.professor || '—')}</td>
                <td style="color:var(--text-secondary);">${esc(c.semester_name || '—')}</td>
                <td>${c.item_count ?? 0}</td>
                <td>
                    <span class="badge ${c.monitored ? 'badge-complete' : 'badge-notstarted'}">
                        ${c.monitored ? '✓ Active' : '○ Paused'}
                    </span>
                </td>
                <td onclick="event.stopPropagation()" style="display:flex;gap:6px;">
                    <a href="/courses/${c.id}" class="btn btn-secondary btn-small">View</a>
                    <button class="btn btn-small" style="background:var(--danger);border-color:var(--danger);" onclick="deleteCourse(${c.id}, this)">Del</button>
                </td>
            </tr>
        `).join('');

        window.renderPagination(total, PAGE_SIZE, coursePage, 'goToCoursePage', 'courses-pagination');
    } catch(e) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--danger);">Error: ${e.message}</td></tr>`;
    }
}

async function deleteCourse(id, btn) {
    if (!confirm('Delete this course? Associated academic items will remain.')) return;
    btn.disabled = true;
    try {
        await API.del(`/api/v1/courses/${id}`);
        showToast('Course deleted', 'success');
        loadCourses();
    } catch(e) {
        showToast('Could not delete: ' + e.message, 'error');
        btn.disabled = false;
    }
}

function goToCoursePage(p) { coursePage = p; loadCourses(); }
// uses global renderPagination from base.html
</script>
{% endblock %}
