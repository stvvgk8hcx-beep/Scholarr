<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing — Scholarr</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@300;400&family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@300;400&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ────────────────────────────────────────── */
:root {
    --ed-text: #2a2a3a;
    --ed-text-light: #d8dae8;
    --ed-muted: #8888a0;
    --ed-accent: #2ecfa1;
    --ed-toolbar-bg: rgba(20, 20, 44, 0.88);
    --ed-text-current: var(--ed-text-light);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    overflow: hidden;
    height: 100vh; width: 100vw;
    font-family: 'Lora', Georgia, serif;
    cursor: text;
    background: #07051b;
    color: var(--ed-text-current);
}

/* ── Background Layers ───────────────────────────────────── */
.bg-layer {
    position: fixed; inset: 0; z-index: 0;
    transition: opacity 2s ease;
    opacity: 0;
}
.bg-layer.active { opacity: 1; }

/* Backgrounds — 9 options matching OmmWriter's set */
.bg-snowscape { background: linear-gradient(180deg, #e8edf4 0%, #d4dce8 30%, #c8cdd8 60%, #f0f0f4 100%); }
.bg-mountains { background: linear-gradient(180deg, #c5d0dc 0%, #8fa4b8 35%, #a0aab8 55%, #d8dce4 100%); }
.bg-night { background: linear-gradient(180deg, #07051b 0%, #0e0c28 30%, #14123a 60%, #0a0820 100%); }
.bg-sunrise { background: linear-gradient(180deg, #1a1030 0%, #3a2050 25%, #804060 45%, #d0a068 65%, #f0d8a0 100%); }
.bg-grey { background: #b8b8c0; }
.bg-window { background: linear-gradient(180deg, #e0dcd0 0%, #d0c8b8 40%, #c8c0b0 60%, #dcd8cc 100%); }
.bg-boats { background: linear-gradient(180deg, #a0c0d0 0%, #88b0c8 30%, #78a0b8 50%, #90b4c4 80%, #c0ccd0 100%); }

/* Chromatherapy — animated color cycling */
.bg-chromo1 {
    background: linear-gradient(135deg, #1a1040, #102840, #0a3028, #201040);
    background-size: 800% 800%;
    animation: chromo1 30s ease infinite;
}
@keyframes chromo1 {
    0%   { background-position: 0% 50%; }
    25%  { background-position: 50% 0%; }
    50%  { background-position: 100% 50%; }
    75%  { background-position: 50% 100%; }
    100% { background-position: 0% 50%; }
}
.bg-chromo2 {
    background: linear-gradient(135deg, #301828, #182838, #283018, #382018, #182838);
    background-size: 800% 800%;
    animation: chromo2 25s ease infinite;
}
@keyframes chromo2 {
    0%   { background-position: 0% 0%; }
    33%  { background-position: 100% 50%; }
    66%  { background-position: 50% 100%; }
    100% { background-position: 0% 0%; }
}

/* ── Writing Container (OmmWriter resizable box) ──────── */
.write-wrap {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.write-box {
    position: relative;
    width: 55%;
    min-width: 320px;
    max-width: 900px;
    height: 75%;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    border: 1.5px dashed rgba(128,128,140,0.35);
    padding: 24px 28px;
    overflow-y: auto;
    resize: both;
}
/* Corner handles */
.write-box::before, .write-box::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border: 1.5px solid rgba(128,128,140,0.4);
    background: rgba(200,200,210,0.15);
    pointer-events: none;
}
.write-box::before { top: -4px; left: -4px; }
.write-box::after { top: -4px; right: -4px; }

.write-title {
    background: transparent;
    border: none; outline: none;
    font-family: inherit;
    font-size: 1.5em;
    font-weight: 600;
    color: var(--ed-text-current);
    text-align: left;
    margin-bottom: 12px;
    opacity: 0.88;
    caret-color: var(--ed-accent);
    flex-shrink: 0;
}
.write-title::placeholder { color: var(--ed-muted); opacity: 0.5; }

.write-area {
    background: transparent;
    border: none; outline: none;
    font-family: inherit;
    font-size: 1.05em;
    line-height: 1.85;
    color: var(--ed-text-current);
    resize: none;
    flex: 1;
    min-height: 100px;
    caret-color: var(--ed-accent);
}
.write-area::placeholder { color: var(--ed-muted); opacity: 0.4; }

/* Word count below box */
.word-counter {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-size: 0.68em;
    color: var(--ed-muted);
    opacity: 0;
    transition: opacity 0.5s;
    background: rgba(200,200,210,0.08);
    padding: 2px 10px;
    border-radius: 3px;
}
.word-counter.visible { opacity: 0.7; }

/* ── Right Toolbar (OmmWriter solid circles) ──────────── */
.tool-rail {
    position: fixed;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 5px;
    opacity: 0;
    transition: opacity 0.5s ease;
}
.tool-rail.visible { opacity: 1; }

.tool-row {
    display: flex;
    align-items: center;
    gap: 3px;
    position: relative;
}
.tool-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: rgba(60,60,70,0.75);
    color: rgba(220,220,230,0.85);
    font-size: 0.6em;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, color 0.2s;
    padding: 0;
}
.tool-btn:hover { background: rgba(80,80,90,0.85); color: #fff; }
.tool-btn svg { width: 13px; height: 13px; }

/* Sub-options: solid small circles */
.tool-opts {
    position: absolute;
    right: 36px;
    display: flex;
    gap: 2px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}
.tool-row:hover .tool-opts { opacity: 1; pointer-events: auto; }

.opt-pill {
    min-width: 26px; height: 26px;
    border-radius: 13px;
    border: none;
    background: rgba(60,60,70,0.7);
    color: rgba(200,200,210,0.8);
    font-size: 0.55em;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    padding: 0 6px;
    align-items: center;
    justify-content: center;
    padding: 0;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s;
}
.opt-pill:hover { background: rgba(80,80,90,0.85); color: #fff; }
.opt-pill.active { background: rgba(46,207,161,0.5); color: #fff; }

/* Volume slider in toolbar */
.vol-wrap {
    position: absolute;
    right: 36px;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}
.tool-row:hover .vol-wrap { opacity: 1; pointer-events: auto; }
.vol-s {
    -webkit-appearance: none;
    appearance: none;
    width: 70px; height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px; outline: none;
}
.vol-s::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--ed-accent);
    cursor: pointer;
}

/* ── Bottom Status (minimal) ─────────────────────────────── */
.status-strip {
    position: fixed;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    padding: 4px 16px;
    display: flex;
    gap: 16px;
    font-size: 0.65em;
    font-family: 'Inter', sans-serif;
    color: var(--ed-muted);
    opacity: 0;
    transition: opacity 0.5s;
    z-index: 20;
}
.status-strip.visible { opacity: 0.5; }

/* ── Back button ─────────────────────────────────────────── */
.back-link {
    position: fixed;
    top: 16px; left: 20px;
    background: rgba(20,20,44,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.72em;
    font-family: 'Inter', sans-serif;
    color: var(--ed-muted);
    cursor: pointer;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.5s;
    text-decoration: none;
}
.back-link:hover { color: #e0e2f0; }
.back-link.visible { opacity: 1; }

/* ── Timer badge ─────────────────────────────────────────── */
.timer {
    position: fixed;
    top: 16px; right: 60px;
    background: rgba(20,20,44,0.5);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.75em;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ed-accent);
    z-index: 20;
    opacity: 0;
    transition: opacity 0.5s;
}
.timer.visible { opacity: 0.8; }

/* ── Brightness overlay ──────────────────────────────────── */
.brightness-overlay {
    position: fixed; inset: 0; z-index: 0;
    background: rgba(0,0,0,0);
    pointer-events: none;
    transition: background 0.8s;
}

/* Light backgrounds need dark text */
body.light-mode { --ed-text-current: #2a2a3a; }
body.dark-mode { --ed-text-current: #d8dae8; }

/* ── Color picker popover ────────────────────────────────── */
.color-picker-pop {
    position: absolute;
    right: 40px;
    background: var(--ed-toolbar-bg);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 160px;
}
.tool-row:hover .color-picker-pop { opacity: 1; pointer-events: auto; }

.color-row { display: flex; gap: 4px; align-items: center; }
.color-row label { font-size: 0.6em; font-family: 'Inter', sans-serif; color: var(--ed-muted); min-width: 40px; }
.color-row input[type=color] {
    width: 24px; height: 24px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    padding: 0;
}
.color-row input[type=range] {
    width: 70px; height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.1);
    border-radius: 2px; outline: none;
}
.color-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--ed-accent);
    cursor: pointer;
}

/* ── Inline Code Block (embedded in writing flow) ──────── */
.code-block {
    max-width: 700px;
    width: 100%;
    margin: 20px auto;
    background: rgba(8,8,22,0.85);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    overflow: hidden;
    display: none;
}
.code-block.open { display: block; }

.code-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-family: 'Inter', sans-serif;
    font-size: 0.7em;
}
.code-bar select {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #a0a4b8;
    padding: 3px 6px;
    border-radius: 3px;
    font-size: 1em;
    font-family: 'Inter', sans-serif;
}
.code-bar select option { background: #12122a; }
.code-bar .run-btn {
    background: var(--ed-accent);
    color: #0a0a18;
    border: none;
    padding: 3px 12px;
    border-radius: 3px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
}
.code-bar .run-btn:hover { opacity: 0.85; }
.code-bar .run-btn:disabled { opacity: 0.4; }
.code-bar .close-code {
    margin-left: auto;
    background: transparent;
    border: none;
    color: var(--ed-muted);
    cursor: pointer;
    font-size: 1.1em;
    padding: 0 4px;
}

.code-split {
    display: flex;
    min-height: 100px;
}
.code-edit {
    flex: 1;
    min-width: 0;
    overflow: auto;
}
.code-ce {
    width: 100%;
    min-height: 100px;
    background: transparent;
    border: none;
    outline: none;
    color: #c8cce0;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.82em;
    line-height: 1.7;
    padding: 10px 14px;
    tab-size: 4;
    white-space: pre-wrap;
    word-break: break-word;
    caret-color: var(--ed-accent);
}
.code-ce:empty::before {
    content: 'Write code here...';
    color: rgba(255,255,255,0.15);
    font-style: italic;
}
/* Syntax colors */
.code-ce .kw { color: #c792ea; }
.code-ce .bi { color: #ffcb6b; }
.code-ce .fn { color: #82aaff; }
.code-ce .st { color: #c3e88d; }
.code-ce .cm { color: #546e7a; font-style: italic; }
.code-ce .nu { color: #f78c6c; }
.code-ce .op { color: #89ddff; }

/* Resizable divider */
.code-divider {
    width: 4px;
    background: rgba(255,255,255,0.04);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background 0.2s;
}
.code-divider:hover, .code-divider.dragging { background: var(--ed-accent); }

.code-out {
    flex: 1;
    min-width: 80px;
    overflow: auto;
    background: rgba(0,0,0,0.2);
}
.code-out-content {
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78em;
    line-height: 1.6;
    color: #8a8ea0;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 100px;
}
.code-out-content.err { color: #f07178; }
.code-out-content.ok { color: #c3e88d; }
.code-out-content .ph { color: rgba(255,255,255,0.12); font-style: italic; }
</style>
</head>
<body class="dark-mode">

<!-- Background layers (crossfade between them) -->
<div class="bg-layer bg-night active" id="bg0"></div>
<div class="bg-layer" id="bg1"></div>
<div class="brightness-overlay" id="brightnessOverlay"></div>

<!-- Back & timer -->
<a href="/notes" class="back-link" id="backLink">Back</a>
<div class="timer" id="timerEl">0:00</div>

<!-- Writing area -->
<div class="write-wrap" id="writeWrap">
    <div class="write-box">
        <input type="text" class="write-title" id="wTitle" placeholder="Untitled" autocomplete="off" spellcheck="false">
        <textarea class="write-area" id="wArea" placeholder="Begin writing..." spellcheck="false"></textarea>

        <!-- Inline code block -->
        <div class="code-block" id="codeBlock">
            <div class="code-bar">
                <select id="codeLang">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="bash">Bash</option>
                    <option value="zsh">Zsh</option>
                </select>
                <button class="run-btn" id="runBtn" onclick="runCode()">Run</button>
                <span id="codeStatus" style="color:var(--ed-muted);"></span>
                <button class="close-code" onclick="toggleCodePanel()" title="Close code block">&times;</button>
            </div>
            <div class="code-split">
                <div class="code-edit">
                    <div class="code-ce" id="codeInput" contenteditable="true" spellcheck="false" onkeydown="handleTab(event)" oninput="debouncedHighlight()"></div>
                </div>
                <div class="code-divider" id="codeDivider"></div>
                <div class="code-out" id="codeOutWrap">
                    <div class="code-out-content" id="codeOutput"><span class="ph">Output appears here</span></div>
                </div>
            </div>
        </div>
        <div class="word-counter" id="wordCounter">0</div>
    </div>
</div>

<!-- Right toolbar (vertical circles — OmmWriter style) -->
<div class="tool-rail" id="toolRail">
    <!-- Row 1: Font -->
    <div class="tool-row">
        <div class="tool-opts" id="fontOpts">
            <button class="opt-pill active" data-font="'Lora', Georgia, serif" onclick="pickFont(this)">Aa</button>
            <button class="opt-pill" data-font="'Noto Serif', serif" onclick="pickFont(this)" style="font-family:'Noto Serif',serif;">Aa</button>
            <button class="opt-pill" data-font="'Inter', sans-serif" onclick="pickFont(this)" style="font-family:'Inter',sans-serif;">Aa</button>
            <button class="opt-pill" data-font="'JetBrains Mono', monospace" onclick="pickFont(this)" style="font-family:'JetBrains Mono',monospace;">Aa</button>
            <button class="opt-pill" data-font="'Caveat', cursive" onclick="pickFont(this)" style="font-family:'Caveat',cursive;">Aa</button>
        </div>
        <button class="tool-btn" title="Font"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 13L8 3l5 10M4.5 10h7"/></svg></button>
    </div>
    <!-- Row 2: Font size -->
    <div class="tool-row">
        <div class="tool-opts" id="sizeOpts">
            <button class="opt-pill" data-size="0.95em" onclick="pickSize(this)">S</button>
            <button class="opt-pill active" data-size="1.1em" onclick="pickSize(this)">M</button>
            <button class="opt-pill" data-size="1.35em" onclick="pickSize(this)">L</button>
            <button class="opt-pill" data-size="1.6em" onclick="pickSize(this)">XL</button>
        </div>
        <button class="tool-btn" title="Size"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 13l4-10M6 13l-4 0M10 13l3-7M13 13l-3 0"/></svg></button>
    </div>
    <!-- Row 3: Background -->
    <div class="tool-row">
        <div class="tool-opts" id="bgOpts">
            <button class="opt-pill" data-bg="bg-snowscape" data-light="1" onclick="pickBg(this)">Snow</button>
            <button class="opt-pill active" data-bg="bg-night" onclick="pickBg(this)">Night</button>
            <button class="opt-pill" data-bg="bg-mountains" data-light="1" onclick="pickBg(this)">Mtn</button>
            <button class="opt-pill" data-bg="bg-sunrise" onclick="pickBg(this)">Rise</button>
            <button class="opt-pill" data-bg="bg-grey" data-light="1" onclick="pickBg(this)">Grey</button>
            <button class="opt-pill" data-bg="bg-boats" data-light="1" onclick="pickBg(this)">Lake</button>
            <button class="opt-pill" data-bg="bg-window" data-light="1" onclick="pickBg(this)">Win</button>
            <button class="opt-pill" data-bg="bg-chromo1" onclick="pickBg(this)">C1</button>
            <button class="opt-pill" data-bg="bg-chromo2" onclick="pickBg(this)">C2</button>
        </div>
        <button class="tool-btn" title="Background"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M2 10l4-4 3 3 2-2 3 3"/></svg></button>
    </div>
    <!-- Row 4: Brightness -->
    <div class="tool-row">
        <div class="tool-opts">
            <button class="opt-pill" data-bright="0" onclick="pickBright(this)">Bright</button>
            <button class="opt-pill active" data-bright="0.15" onclick="pickBright(this)">Normal</button>
            <button class="opt-pill" data-bright="0.35" onclick="pickBright(this)">Dim</button>
        </div>
        <button class="tool-btn" title="Brightness"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2M4 4l1.4 1.4M10.6 10.6L12 12M12 4l-1.4 1.4M5.4 10.6L4 12"/></svg></button>
    </div>
    <!-- Row 5: Ambient audio -->
    <div class="tool-row">
        <div class="vol-wrap">
            <div style="display:flex;flex-direction:column;gap:3px;">
                <button class="opt-pill" data-amb="" onclick="pickAmbient(this)">Off</button>
                <button class="opt-pill" data-amb="rain" onclick="pickAmbient(this)">Rain</button>
                <button class="opt-pill" data-amb="forest" onclick="pickAmbient(this)">Forest</button>
                <button class="opt-pill" data-amb="waves" onclick="pickAmbient(this)">Waves</button>
                <button class="opt-pill" data-amb="fire" onclick="pickAmbient(this)">Fire</button>
                <button class="opt-pill" data-amb="wind" onclick="pickAmbient(this)">Wind</button>
                <button class="opt-pill" data-amb="cafe" onclick="pickAmbient(this)">Cafe</button>
                <button class="opt-pill" data-amb="piano" onclick="pickAmbient(this)">Piano</button>
                <button class="opt-pill" data-amb="space" onclick="pickAmbient(this)">Space</button>
            </div>
            <input type="range" class="vol-s" id="ambVol" min="0" max="100" value="25" oninput="setAmbVol(this.value)">
        </div>
        <button class="tool-btn" title="Ambient Sound"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h2l3-3v10l-3-3H3z"/><path d="M10 5.5a3 3 0 0 1 0 5M11.5 3.5a6 6 0 0 1 0 9"/></svg></button>
    </div>
    <!-- Row 6: Typing sounds -->
    <div class="tool-row">
        <div class="tool-opts" id="keyOpts">
            <button class="opt-pill active" data-keys="" onclick="pickKeys(this)">Off</button>
            <button class="opt-pill" data-keys="bubble" onclick="pickKeys(this)">Bubble</button>
            <button class="opt-pill" data-keys="click" onclick="pickKeys(this)">Click</button>
            <button class="opt-pill" data-keys="typewriter" onclick="pickKeys(this)">Type</button>
            <button class="opt-pill" data-keys="chime" onclick="pickKeys(this)">Chime</button>
            <button class="opt-pill" data-keys="rain" onclick="pickKeys(this)">Rain</button>
            <button class="opt-pill" data-keys="drum" onclick="pickKeys(this)">Drum</button>
        </div>
        <button class="tool-btn" title="Typing Sounds"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="7" width="14" height="7" rx="1"/><path d="M4 10h1M7 10h2M11 10h1M3 12h10"/></svg></button>
    </div>
    <!-- Row 7: Colors -->
    <div class="tool-row">
        <div class="color-picker-pop">
            <div class="color-row"><label>Text</label><input type="color" id="cpText" value="#d8dae8" oninput="setCustomTextColor(this.value)"></div>
            <div class="color-row"><label>Opacity</label><input type="range" id="cpOpacity" min="50" max="100" value="90" oninput="setTextOpacity(this.value)"></div>
        </div>
        <button class="tool-btn" title="Colors"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="3"/><circle cx="10" cy="6" r="3"/><circle cx="8" cy="10" r="3"/></svg></button>
    </div>
    <!-- Row 8: Backups/History -->
    <div class="tool-row">
        <div class="tool-opts" style="flex-direction:column;min-width:200px;" id="backupOpts">
            <div style="font-size:0.65em;color:var(--ed-muted);padding:2px 4px;">Loading...</div>
        </div>
        <button class="tool-btn" title="Backup History" onclick="loadBackups()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l3 2"/></svg></button>
    </div>
    <!-- Row 9: Code Block -->
    <div class="tool-row">
        <button class="tool-btn" title="Insert Code Block" onclick="toggleCodePanel()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 4L1 8l4 4M11 4l4 4-4 4M9 2l-2 12"/></svg></button>
    </div>
    <!-- Row 10: Save/Export -->
    <div class="tool-row">
        <div class="tool-opts">
            <button class="opt-pill" onclick="exportAs('txt')">TXT</button>
            <button class="opt-pill" onclick="exportAs('md')">MD</button>
            <button class="opt-pill" onclick="copyToClipboard()">Copy</button>
        </div>
        <button class="tool-btn" title="Export"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3M3 12h10"/></svg></button>
    </div>
    <!-- Row 11: View/Size -->
    <div class="tool-row">
        <div class="tool-opts">
            <button class="opt-pill" onclick="setView('narrow')">Narrow</button>
            <button class="opt-pill active" onclick="setView('default')">Default</button>
            <button class="opt-pill" onclick="setView('wide')">Wide</button>
            <button class="opt-pill" onclick="setView('full')">Full</button>
        </div>
        <button class="tool-btn" title="View Size"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="8" rx="1"/><path d="M5 8h6M8 5v6"/></svg></button>
    </div>
    <!-- Row 12: Fullscreen -->
    <div class="tool-row">
        <button class="tool-btn" title="Fullscreen" onclick="toggleFS()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6V2h4M10 2h4v4M14 10v4h-4M6 14H2v-4"/></svg></button>
    </div>
</div>

<!-- Bottom status strip -->
<div class="status-strip" id="statusStrip">
    <span id="sWords">0 words</span>
    <span id="sSave">Saved</span>
    <span id="sChars">0 characters</span>
</div>

<!-- no separate code panel: code block is inline in write-box -->

<script>
/* ══════════════════════════════════════════════════════════
   Scholarr Note Editor — OmmWriter-inspired
   ══════════════════════════════════════════════════════════ */
const API_KEY = "{{ api_key }}";
const NOTE_ID = parseInt("{{ note_id }}");

// ── State ─────────────────────────────────────────────────
let saveTimer = null;
let hideTimer = null;
let sessionStart = Date.now();
let audioCtx = null;
let ambNodes = {};  // current ambient oscillators/sources
let keyType = '';
let keySoundSeq = 0;  // sequence counter to vary sounds
let prefs = {};

// ── API ───────────────────────────────────────────────────
async function api(m, u, d) {
    const o = { method: m, headers: { 'X-API-Key': API_KEY, 'Content-Type': 'application/json' } };
    if (d) o.body = JSON.stringify(d);
    const r = await fetch(u, o);
    if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail||r.status); }
    return r.status === 204 ? null : r.json();
}

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}

    try {
        const n = await api('GET', `/api/v1/notes/${NOTE_ID}`);
        document.getElementById('wTitle').value = n.title || '';
        document.getElementById('wArea').value = n.content || '';
        document.title = (n.title || 'Untitled') + ' — Scholarr';
        updateCounts();
        if (n.preferences) {
            prefs = n.preferences;
            if (prefs.font) applyOpt('fontOpts', 'data-font', prefs.font, el => { pickFont(el, true); });
            if (prefs.fontSize) applyOpt('sizeOpts', 'data-size', prefs.fontSize, el => { pickSize(el, true); });
            if (prefs.bg) applyOpt('bgOpts', 'data-bg', prefs.bg, el => { pickBg(el, true); });
            if (prefs.keys) applyOpt('keyOpts', 'data-keys', prefs.keys, el => { pickKeys(el, true); });
            if (prefs.bright !== undefined) pickBrightVal(prefs.bright);
            if (prefs.ambVol !== undefined) document.getElementById('ambVol').value = prefs.ambVol;
            if (prefs.textColor) { document.getElementById('cpText').value = prefs.textColor; setCustomTextColor(prefs.textColor); }
            if (prefs.textOpacity) { document.getElementById('cpOpacity').value = prefs.textOpacity; setTextOpacity(prefs.textOpacity); }
        }
    } catch(e) { console.error('Load error:', e); }

    setupAutoHide();
    startTimer();
    document.getElementById('wArea').focus();
});

function applyOpt(containerId, attr, val, fn) {
    const el = document.querySelector(`#${containerId} [${attr}="${val}"]`);
    if (el) fn(el);
}

// ── Auto-save ─────────────────────────────────────────────
function scheduleSave() {
    clearTimeout(saveTimer);
    document.getElementById('sSave').textContent = 'Saving...';
    saveTimer = setTimeout(doSave, 1200);
}

async function doSave() {
    const title = document.getElementById('wTitle').value.trim() || 'Untitled';
    const content = document.getElementById('wArea').value;
    const words = content.trim() ? content.trim().split(/\s+/).length : 0;
    const elapsed = Math.round((Date.now() - sessionStart) / 1000);

    prefs = {
        font: getActive('fontOpts', 'data-font'),
        fontSize: getActive('sizeOpts', 'data-size'),
        bg: getActive('bgOpts', 'data-bg'),
        keys: getActive('keyOpts', 'data-keys'),
        bright: parseFloat(document.getElementById('brightnessOverlay').style.background?.match(/[\d.]+\)$/)?.[0] || '0'),
        ambVol: parseInt(document.getElementById('ambVol').value),
        textColor: document.getElementById('cpText').value,
        textOpacity: parseInt(document.getElementById('cpOpacity').value),
    };

    try {
        await api('PUT', `/api/v1/notes/${NOTE_ID}`, { title, content, word_count: words, duration_seconds: elapsed, preferences: prefs });
        document.getElementById('sSave').textContent = 'Saved';
    } catch(e) {
        document.getElementById('sSave').textContent = 'Error';
    }
}

function getActive(id, attr) {
    const el = document.querySelector(`#${id} .opt-pill.active`);
    return el ? el.getAttribute(attr) : '';
}

document.getElementById('wTitle').addEventListener('input', scheduleSave);
document.getElementById('wArea').addEventListener('input', () => { updateCounts(); scheduleSave(); });

// ── Counts ────────────────────────────────────────────────
function updateCounts() {
    const t = document.getElementById('wArea').value;
    const w = t.trim() ? t.trim().split(/\s+/).length : 0;
    document.getElementById('sWords').textContent = w + ' words';
    document.getElementById('sChars').textContent = t.length + ' characters';
    document.getElementById('wordCounter').textContent = w;
}

// ── Timer ─────────────────────────────────────────────────
function startTimer() {
    setInterval(() => {
        const s = Math.round((Date.now() - sessionStart) / 1000);
        const m = Math.floor(s / 60), sec = s % 60;
        document.getElementById('timerEl').textContent = m + ':' + String(sec).padStart(2, '0');
    }, 1000);
}

// ── Auto-hide UI (OmmWriter behavior) ─────────────────────
function setupAutoHide() {
    const els = ['toolRail', 'backLink', 'timerEl', 'statusStrip', 'wordCounter'];
    function show() {
        els.forEach(id => document.getElementById(id)?.classList.add('visible'));
        clearTimeout(hideTimer);
        hideTimer = setTimeout(hide, 2500);
    }
    function hide() {
        els.forEach(id => document.getElementById(id)?.classList.remove('visible'));
    }
    document.addEventListener('mousemove', show);
    document.addEventListener('touchstart', show);
    show();
}

// ── Helpers to set active pill ────────────────────────────
function setActivePill(container, pill) {
    container.querySelectorAll('.opt-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
}

// ── Font ──────────────────────────────────────────────────
function pickFont(el, silent) {
    setActivePill(el.parentElement, el);
    const f = el.getAttribute('data-font');
    document.getElementById('wArea').style.fontFamily = f;
    document.getElementById('wTitle').style.fontFamily = f;
    if (!silent) scheduleSave();
}

// ── Size ──────────────────────────────────────────────────
function pickSize(el, silent) {
    setActivePill(el.parentElement, el);
    document.getElementById('wArea').style.fontSize = el.getAttribute('data-size');
    if (!silent) scheduleSave();
}

// ── Background (crossfade between two layers) ─────────────
let activeBgIdx = 0;
function pickBg(el, silent) {
    setActivePill(el.parentElement, el);
    const cls = el.getAttribute('data-bg');
    const isLight = el.hasAttribute('data-light');
    const nextIdx = activeBgIdx === 0 ? 1 : 0;
    const nextEl = document.getElementById('bg' + nextIdx);
    const curEl = document.getElementById('bg' + activeBgIdx);
    nextEl.className = 'bg-layer ' + cls;
    nextEl.classList.add('active');
    curEl.classList.remove('active');
    activeBgIdx = nextIdx;
    // Switch text color mode
    document.body.className = isLight ? 'light-mode' : 'dark-mode';
    if (!silent) scheduleSave();
}

// ── Brightness ────────────────────────────────────────────
function pickBright(el) {
    setActivePill(el.parentElement, el);
    const v = parseFloat(el.getAttribute('data-bright'));
    document.getElementById('brightnessOverlay').style.background = `rgba(0,0,0,${v})`;
    scheduleSave();
}
function pickBrightVal(v) {
    document.getElementById('brightnessOverlay').style.background = `rgba(0,0,0,${v})`;
}

// ── Color customization ───────────────────────────────────
function setCustomTextColor(c) {
    document.documentElement.style.setProperty('--ed-text-current', c);
    scheduleSave();
}
function setTextOpacity(v) {
    const o = v / 100;
    document.getElementById('wArea').style.opacity = o;
    document.getElementById('wTitle').style.opacity = o;
    scheduleSave();
}

// ══════════════════════════════════════════════════════════
// AMBIENT SOUND ENGINE — fully synthesized, no external files
// ══════════════════════════════════════════════════════════
let ambRunning = false;
let ambType = '';

function pickAmbient(el) {
    setActivePill(el.parentElement, el);
    const t = el.getAttribute('data-amb');
    stopAmbient();
    if (t) startAmbient(t);
    scheduleSave();
}

function setAmbVol(v) {
    if (ambNodes.gain) ambNodes.gain.gain.value = v / 100;
}

function stopAmbient() {
    ambRunning = false;
    ambType = '';
    Object.values(ambNodes).forEach(n => { try { if (n.stop) n.stop(); if (n.disconnect) n.disconnect(); } catch(e) {} });
    ambNodes = {};
}

function startAmbient(type) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    ambRunning = true;
    ambType = type;

    const master = audioCtx.createGain();
    master.gain.value = parseInt(document.getElementById('ambVol').value) / 100;
    master.connect(audioCtx.destination);
    ambNodes.gain = master;

    if (type === 'rain') synthRain(master);
    else if (type === 'forest') synthForest(master);
    else if (type === 'waves') synthWaves(master);
    else if (type === 'fire') synthFire(master);
    else if (type === 'wind') synthWind(master);
    else if (type === 'cafe') synthCafe(master);
    else if (type === 'piano') synthPiano(master);
    else if (type === 'space') synthSpace(master);
}

// Brown noise base for natural sounds
function brownNoise(dest, vol) {
    const bufSize = audioCtx.sampleRate * 2;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < bufSize; i++) {
        const white = Math.random() * 2 - 1;
        d[i] = (last + 0.02 * white) / 1.02;
        last = d[i];
        d[i] *= 3.5;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const g = audioCtx.createGain(); g.gain.value = vol;
    const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass';
    src.connect(lp); lp.connect(g); g.connect(dest);
    src.start();
    return { src, gain: g, filter: lp };
}

function synthRain(dest) {
    const n = brownNoise(dest, 0.6);
    n.filter.frequency.value = 3000;
    ambNodes.rain = n.src;
    // High-frequency patter
    const buf2 = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    const d2 = buf2.getChannelData(0);
    for (let i = 0; i < d2.length; i++) d2[i] = (Math.random() * 2 - 1) * 0.15;
    const s2 = audioCtx.createBufferSource(); s2.buffer = buf2; s2.loop = true;
    const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 4000;
    const g2 = audioCtx.createGain(); g2.gain.value = 0.3;
    s2.connect(hp); hp.connect(g2); g2.connect(dest);
    s2.start(); ambNodes.rain2 = s2;
}

function synthForest(dest) {
    const n = brownNoise(dest, 0.25);
    n.filter.frequency.value = 800;
    ambNodes.for1 = n.src;
    // Birds: periodic sine chirps
    function chirp() {
        if (!ambRunning || ambType !== 'forest') return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        const baseF = 2000 + Math.random() * 3000;
        o.frequency.setValueAtTime(baseF, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(baseF * 1.3, audioCtx.currentTime + 0.1);
        o.frequency.exponentialRampToValueAtTime(baseF * 0.8, audioCtx.currentTime + 0.2);
        g.gain.setValueAtTime(0.03, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        o.connect(g); g.connect(dest);
        o.start(); o.stop(audioCtx.currentTime + 0.3);
        setTimeout(chirp, 1500 + Math.random() * 4000);
    }
    setTimeout(chirp, 500);
}

function synthWaves(dest) {
    // Low rumble base
    const n = brownNoise(dest, 0.4);
    n.filter.frequency.value = 400;
    ambNodes.wav1 = n.src;
    // LFO modulation for wave cycle
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 0.08;
    const lfoG = audioCtx.createGain(); lfoG.gain.value = 0.3;
    lfo.connect(lfoG); lfoG.connect(n.gain.gain);
    lfo.start(); ambNodes.wavLfo = lfo;
}

function synthFire(dest) {
    const n = brownNoise(dest, 0.5);
    n.filter.frequency.value = 1200;
    ambNodes.fire1 = n.src;
    // Crackle
    function crackle() {
        if (!ambRunning || ambType !== 'fire') return;
        const buf = audioCtx.createBuffer(1, 1200, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < 1200; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / 1200);
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        const g = audioCtx.createGain(); g.gain.value = 0.08 + Math.random() * 0.06;
        const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2000 + Math.random() * 3000;
        s.connect(bp); bp.connect(g); g.connect(dest);
        s.start();
        setTimeout(crackle, 100 + Math.random() * 300);
    }
    setTimeout(crackle, 200);
}

function synthWind(dest) {
    const n = brownNoise(dest, 0.4);
    n.filter.frequency.value = 600;
    ambNodes.wind1 = n.src;
    const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.05;
    const lG = audioCtx.createGain(); lG.gain.value = 400;
    lfo.connect(lG); lG.connect(n.filter.frequency);
    lfo.start(); ambNodes.windLfo = lfo;
}

function synthCafe(dest) {
    const n = brownNoise(dest, 0.2);
    n.filter.frequency.value = 2000;
    ambNodes.cafe1 = n.src;
    // Murmur — filtered noise bursts
    function murmur() {
        if (!ambRunning || ambType !== 'cafe') return;
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.3, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.04 * (1 - i/d.length);
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 800 + Math.random() * 1200;
        const g = audioCtx.createGain(); g.gain.value = 0.3;
        s.connect(bp); bp.connect(g); g.connect(dest);
        s.start();
        setTimeout(murmur, 600 + Math.random() * 2000);
    }
    setTimeout(murmur, 300);
}

function synthPiano(dest) {
    function playNote() {
        if (!ambRunning || ambType !== 'piano') return;
        const notes = [261.6, 293.7, 329.6, 349.2, 392, 440, 493.9, 523.3];
        const freq = notes[Math.floor(Math.random() * notes.length)];
        const o = audioCtx.createOscillator();
        o.type = 'sine';
        o.frequency.value = freq;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.06, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
        // Add harmonics
        const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq * 2;
        const g2 = audioCtx.createGain(); g2.gain.setValueAtTime(0.02, audioCtx.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
        o.connect(g); g.connect(dest);
        o2.connect(g2); g2.connect(dest);
        o.start(); o.stop(audioCtx.currentTime + 3);
        o2.start(); o2.stop(audioCtx.currentTime + 2);
        setTimeout(playNote, 2000 + Math.random() * 4000);
    }
    setTimeout(playNote, 500);
}

function synthSpace(dest) {
    // Deep drone
    const o1 = audioCtx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 55;
    const g1 = audioCtx.createGain(); g1.gain.value = 0.1;
    o1.connect(g1); g1.connect(dest); o1.start(); ambNodes.sp1 = o1;
    const o2 = audioCtx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 82.4;
    const g2 = audioCtx.createGain(); g2.gain.value = 0.06;
    o2.connect(g2); g2.connect(dest); o2.start(); ambNodes.sp2 = o2;
    // Slow pad
    const n = brownNoise(dest, 0.08);
    n.filter.frequency.value = 200;
    ambNodes.sp3 = n.src;
}

// ══════════════════════════════════════════════════════════
// TYPING SOUNDS — 7 types with sequenced variations
// ══════════════════════════════════════════════════════════
function pickKeys(el, silent) {
    setActivePill(el.parentElement, el);
    keyType = el.getAttribute('data-keys');
    keySoundSeq = 0;
    if (!silent) scheduleSave();
}

document.addEventListener('keydown', e => {
    if (!keyType || !audioCtx || e.repeat) return;
    const validTargets = ['wArea', 'wTitle', 'codeInput'];
    if (!validTargets.includes(e.target.id)) return;
    if (e.key === 'Backspace' || e.key === 'Delete') return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    playKeySound();
});

/* ── Beautiful Typing Sounds ──────────────────────────────
   Each sound uses multiple layered oscillators with reverb-like
   decay envelopes, detuning, and harmonic richness for a warm,
   satisfying, study-friendly feel. 7 variations per type cycle
   through a pentatonic scale to create a musical texture.
   ──────────────────────────────────────────────────────────── */
const PENTA = [261.6, 293.7, 329.6, 392, 440, 523.3, 587.3]; // C major pentatonic

function playKeySound() {
    keySoundSeq++;
    const t = audioCtx.currentTime;
    const idx = keySoundSeq % 7;
    const baseNote = PENTA[idx];

    if (keyType === 'bubble') {
        // Warm water droplet — sine with pitch bend down, soft and round
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(baseNote * 2, t);
        o.frequency.exponentialRampToValueAtTime(baseNote * 0.8, t + 0.15);
        g.gain.setValueAtTime(0.045, t);
        g.gain.setValueAtTime(0.04, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t); o.stop(t + 0.18);
    } else if (keyType === 'click') {
        // Soft mechanical click — very short, warm, like a good keyboard
        const buf = audioCtx.createBuffer(1, 600, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < 600; i++) {
            d[i] = (Math.random() * 2 - 1) * Math.exp(-i / 60) * 0.3;
        }
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 3000 + idx * 300; bp.Q.value = 2;
        const g = audioCtx.createGain(); g.gain.value = 0.12;
        s.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
        s.start(t);
    } else if (keyType === 'typewriter') {
        // Rich typewriter — impact + bell ring, warm and nostalgic
        const buf = audioCtx.createBuffer(1, 1200, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < 1200; i++) {
            d[i] = (Math.random() * 2 - 1) * Math.exp(-i / 80) * 0.25;
        }
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        const bp = audioCtx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 1800 + idx * 200; bp.Q.value = 3;
        const g = audioCtx.createGain(); g.gain.value = 0.15;
        s.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
        s.start(t);
        // Subtle bell overtone
        const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
        o2.type = 'sine'; o2.frequency.value = 2800 + idx * 100;
        g2.gain.setValueAtTime(0.008, t + 0.01);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.start(t + 0.01); o2.stop(t + 0.12);
    } else if (keyType === 'chime') {
        // Wind chime — pure sine with harmonics, long gentle decay
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = baseNote * 2;
        g.gain.setValueAtTime(0.03, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t); o.stop(t + 0.8);
        // Harmonic
        const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
        o2.type = 'sine'; o2.frequency.value = baseNote * 3;
        g2.gain.setValueAtTime(0.012, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.start(t); o2.stop(t + 0.6);
    } else if (keyType === 'rain') {
        // Gentle raindrop — filtered noise burst with pitch bend
        const buf = audioCtx.createBuffer(1, 2000, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < 2000; i++) {
            d[i] = (Math.random() * 2 - 1) * Math.exp(-i / 200) * 0.15;
        }
        const s = audioCtx.createBufferSource(); s.buffer = buf;
        const lp = audioCtx.createBiquadFilter();
        lp.type = 'lowpass'; lp.frequency.value = 4000 + idx * 500;
        const g = audioCtx.createGain(); g.gain.value = 0.2;
        s.connect(lp); lp.connect(g); g.connect(audioCtx.destination);
        s.start(t);
        // Tiny sine plop
        const o = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(800 + idx * 100, t);
        o.frequency.exponentialRampToValueAtTime(200, t + 0.06);
        g2.gain.setValueAtTime(0.025, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        o.connect(g2); g2.connect(audioCtx.destination);
        o.start(t); o.stop(t + 0.08);
    } else if (keyType === 'drum') {
        // Soft wooden tap — like bamboo or wood block, warm and grounding
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'triangle';
        o.frequency.setValueAtTime(300 + idx * 30, t);
        o.frequency.exponentialRampToValueAtTime(120, t + 0.05);
        g.gain.setValueAtTime(0.06, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t); o.stop(t + 0.08);
        // Body resonance
        const o2 = audioCtx.createOscillator(); const g2 = audioCtx.createGain();
        o2.type = 'sine'; o2.frequency.value = 180 + idx * 15;
        g2.gain.setValueAtTime(0.03, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.start(t); o2.stop(t + 0.12);
    }
}

// ── View modes ───────────────────────────────────────────
function setView(mode) {
    const box = document.querySelector('.write-box');
    const views = { narrow: '40%', default: '55%', wide: '75%', full: '95%' };
    box.style.width = views[mode] || '55%';
    // Update active pill
    const parent = event.target.parentElement;
    if (parent) {
        parent.querySelectorAll('.opt-pill').forEach(p => p.classList.remove('active'));
        event.target.classList.add('active');
    }
    scheduleSave();
}

// ── Fullscreen ────────────────────────────────────────────
function toggleFS() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
}

// ── Export ─────────────────────────────────────────────────
function exportAs(fmt) {
    const title = document.getElementById('wTitle').value || 'note';
    const content = document.getElementById('wArea').value;
    const name = title.replace(/[^a-zA-Z0-9_\- ]/g, '_');
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${name}.${fmt}`;
    a.click(); URL.revokeObjectURL(a.href);
}

function copyToClipboard() {
    const content = document.getElementById('wArea').value;
    navigator.clipboard.writeText(content).then(() => {
        document.getElementById('sSave').textContent = 'Copied!';
        setTimeout(() => document.getElementById('sSave').textContent = 'Saved', 1500);
    });
}

// ── Save on leave (synchronous backup) ────────────────────
window.addEventListener('beforeunload', (e) => {
    // Fire synchronous save via sendBeacon
    const title = document.getElementById('wTitle').value.trim() || 'Untitled';
    const content = document.getElementById('wArea').value;
    const words = content.trim() ? content.trim().split(/\s+/).length : 0;
    const elapsed = Math.round((Date.now() - sessionStart) / 1000);
    const payload = JSON.stringify({ title, content, word_count: words, duration_seconds: elapsed, preferences: prefs });
    navigator.sendBeacon(
        `/api/v1/notes/${NOTE_ID}/beacon`,
        new Blob([payload], { type: 'application/json' })
    );
});

// ── Keyboard shortcuts ────────────────────────────────────
document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); doSave(); }
});

// ── Backup history ────────────────────────────────────────
async function loadBackups() {
    const el = document.getElementById('backupOpts');
    try {
        const backups = await api('GET', `/api/v1/notes/${NOTE_ID}/backups`);
        if (!backups.length) {
            el.innerHTML = '<div style="font-size:0.65em;color:var(--ed-muted);padding:4px 6px;">No backups yet. Backups are created automatically on each save.</div>';
            return;
        }
        el.innerHTML = backups.slice(0, 10).map(b => {
            const d = new Date(b.created_at);
            const when = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + ' ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            return `<button class="opt-pill" style="justify-content:flex-start;text-align:left;padding:4px 8px;" onclick="restoreBackup(${b.id})" title="${(b.preview||'').slice(0,80)}">${when} (${b.word_count}w)</button>`;
        }).join('');
    } catch(e) {
        el.innerHTML = '<div style="font-size:0.65em;color:var(--ed-muted);padding:4px;">Error loading backups</div>';
    }
}

async function restoreBackup(backupId) {
    if (!confirm('Restore this backup? Your current content will be saved as a backup first.')) return;
    try {
        const restored = await api('POST', `/api/v1/notes/${NOTE_ID}/backups/${backupId}/restore`);
        document.getElementById('wArea').value = restored.content || '';
        document.getElementById('wTitle').value = restored.title || '';
        updateCounts();
        document.getElementById('sSave').textContent = 'Restored';
        setTimeout(() => document.getElementById('sSave').textContent = 'Saved', 2000);
    } catch(e) {
        alert('Restore failed: ' + e.message);
    }
}

// CODE BLOCK — syntax highlighting + execution

let codePanelOpen = false;

function toggleCodePanel() {
    codePanelOpen = !codePanelOpen;
    document.getElementById('codeBlock').classList.toggle('open', codePanelOpen);
    if (codePanelOpen) {
        setTimeout(() => {

        }, 100);

// ── Resizable divider ────────────────────────────────────
(function() {
    const divider = document.getElementById('codeDivider');
    if (!divider) return;
    let dragging = false;
    let startX = 0;
    let startLeftW = 0;

    divider.addEventListener('mousedown', e => {
        dragging = true;
        startX = e.clientX;
        const editEl = divider.previousElementSibling;
        startLeftW = editEl.getBoundingClientRect().width;
        divider.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        const diff = e.clientX - startX;
        const editEl = divider.previousElementSibling;
        const parent = divider.parentElement;
        const parentW = parent.getBoundingClientRect().width;
        const newW = Math.max(120, Math.min(parentW - 120, startLeftW + diff));
        editEl.style.flex = 'none';
        editEl.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
})();

// Tab key inserts spaces instead of switching focus
function handleTab(e) {
    if (e.key === 'Tab') {
        e.preventDefault();
        document.execCommand('insertText', false, '    ');
        debouncedHighlight();
    }
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        runCode();
    }
}

// ── Syntax Highlighting (contenteditable) ─────────────────
let hlTimer = null;
function debouncedHighlight() {
    clearTimeout(hlTimer);
    hlTimer = setTimeout(applyHighlight, 150);
}

const HL = {
    python: [
        [/(#.*$)/gm, 'cm'],
        [/("""[\s\S]*?"""|'''[\s\S]*?'''|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')/g, 'st'],
        [/\b(def|class|if|elif|else|for|while|try|except|finally|with|as|import|from|return|yield|raise|break|continue|pass|and|or|not|in|is|lambda|global|nonlocal|assert|del|True|False|None|async|await)\b/g, 'kw'],
        [/\b(print|len|range|int|str|float|list|dict|set|tuple|type|isinstance|enumerate|zip|map|filter|sorted|reversed|open|input|format|abs|max|min|sum|any|all|round|pow|super)\b/g, 'bi'],
        [/\b(\d+\.?\d*(?:e[+-]?\d+)?)\b/g, 'nu'],
    ],
    javascript: [
        [/(\/\/.*$|\/\*[\s\S]*?\*\/)/gm, 'cm'],
        [/(`(?:\\.|[^`\\])*`|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')/g, 'st'],
        [/\b(const|let|var|function|class|if|else|for|while|do|switch|case|break|continue|return|try|catch|finally|throw|new|typeof|instanceof|this|import|export|from|async|await|true|false|null|undefined)\b/g, 'kw'],
        [/\b(console|document|window|Math|JSON|Array|Object|Promise|Date|fetch|setTimeout|parseInt)\b/g, 'bi'],
        [/\b(\d+\.?\d*)\b/g, 'nu'],
    ],
    bash: [
        [/(#.*$)/gm, 'cm'],
        [/("(?:\\.|[^"\\])*"|'[^']*')/g, 'st'],
        [/\b(if|then|else|elif|fi|for|while|do|done|case|esac|function|return|exit|local|export)\b/g, 'kw'],
        [/\b(echo|printf|cd|ls|cat|grep|sed|awk|find|mkdir|rm|cp|mv|curl|wget|git|pip|python|node)\b/g, 'bi'],
        [/\b(\d+)\b/g, 'nu'],
    ],
    zsh: null, // falls back to bash
};

function applyHighlight() {
    const el = document.getElementById('codeInput');
    const lang = document.getElementById('codeLang').value;
    const rules = HL[lang] || HL[lang === 'zsh' ? 'bash' : 'python'] || HL.python;

    // Get plain text and cursor position
    const sel = window.getSelection();
    let cursorOffset = 0;
    if (sel.rangeCount > 0) {
        const range = sel.getRangeAt(0);
        const preRange = range.cloneRange();
        preRange.selectNodeContents(el);
        preRange.setEnd(range.startContainer, range.startOffset);
        cursorOffset = preRange.toString().length;
    }

    const text = el.innerText || '';
    if (!text.trim()) { el.innerHTML = ''; return; }

    // Tokenize
    let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const tokens = [];
    let tid = 0;
    for (const [re, cls] of rules) {
        re.lastIndex = 0;
        html = html.replace(re, (m) => {
            const id = `\x00${tid++}\x00`;
            tokens.push({ id, html: `<span class="${cls}">${m}</span>` });
            return id;
        });
    }
    for (const t of tokens) html = html.replace(t.id, t.html);
    html = html.replace(/\n/g, '<br>');

    el.innerHTML = html;

    // Restore cursor
    try {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null);
        let charCount = 0;
        let node;
        while (node = walker.nextNode()) {
            const len = node.textContent.length;
            if (charCount + len >= cursorOffset) {
                const range = document.createRange();
                range.setStart(node, cursorOffset - charCount);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
                break;
            }
            charCount += len;
        }
    } catch(e) {}
}

function getCodeText() {
    return document.getElementById('codeInput').innerText || '';
}

// ── Run Code ─────────────────────────────────────────────
async function runCode() {
    const code = getCodeText().trim();
    const lang = document.getElementById('codeLang').value;
    const outEl = document.getElementById('codeOutput');
    const btn = document.getElementById('runBtn');
    const status = document.getElementById('codeStatus');

    if (!code) {
        outEl.className = 'code-out-content';
        outEl.innerHTML = '<span class="ph">Write some code first...</span>';
        return;
    }

    btn.disabled = true;
    btn.textContent = 'Running...';
    status.textContent = '';
    outEl.className = 'code-out-content';
    outEl.textContent = 'Executing...';

    try {
        const result = await api('POST', '/api/v1/code/run', { language: lang, code });
        outEl.className = 'code-out-content ' + (result.error ? 'err' : 'ok');
        outEl.textContent = result.output || '(no output)';
        status.textContent = result.error ? 'Exit: ' + (result.exit_code ?? '?') : 'OK';
        status.style.color = result.error ? '#f07178' : '#c3e88d';
    } catch(e) {
        outEl.className = 'code-out-content err';
        outEl.textContent = 'Error: ' + e.message;
    } finally {
        btn.disabled = false;
        btn.textContent = 'Run';
    }
}
