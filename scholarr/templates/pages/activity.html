{% extends "layouts/base.html" %}

{% block title %}Activity Log{% endblock %}
{% block page_title %}Activity Log{% endblock %}

{% block extra_css %}
<style>
.activity-filters {
    background: var(--bg-secondary);
    padding: 16px;
    border-radius: 4px;
    margin-bottom: 16px;
    border: 1px solid var(--border-color);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
}
.activity-filters .form-group { margin-bottom: 0; flex: 1; min-width: 150px; }

.timeline { position: relative; padding: 4px 0; }
.timeline::before {
    content: '';
    position: absolute;
    left: 20px; top: 0; bottom: 0;
    width: 2px;
    background: var(--border-color);
}
.activity-entry {
    margin-left: 64px;
    margin-bottom: 16px;
    position: relative;
    padding: 14px 16px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 4px;
    transition: border-color 0.2s;
}
.activity-entry:hover { border-color: var(--accent-blue); }
.activity-icon {
    position: absolute;
    left: -44px; top: 12px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg-tertiary);
    border: 2px solid var(--border-color);
    display: flex; align-items: center; justify-content: center;
    font-size: 1em;
}
.activity-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.activity-title { font-weight: 600; color: var(--text-primary); }
.activity-time { color: var(--text-secondary); font-size: 0.82em; white-space: nowrap; margin-left: 12px; }
.activity-entity { color: var(--text-secondary); font-size: 0.88em; }
</style>
{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;gap:0;">

    <!-- Filters -->
    <div class="activity-filters">
        <div class="form-group">
            <label>Event Type</label>
            <select id="filter-type" onchange="loadActivity()">
                <option value="">All Events</option>
                <option value="import">Import</option>
                <option value="create">Create</option>
                <option value="rename">Rename</option>
                <option value="move">Move</option>
                <option value="update">Update</option>
                <option value="delete">Delete</option>
                <option value="scan">Scan</option>
            </select>
        </div>
        <div class="form-group">
            <label>Entity Type</label>
            <select id="filter-entity" onchange="loadActivity()">
                <option value="">All Types</option>
                <option value="course">Course</option>
                <option value="academic_item">Academic Item</option>
                <option value="file">File</option>
                <option value="semester">Semester</option>
            </select>
        </div>
    </div>

    <!-- Timeline -->
    <div class="timeline">
        <div id="activityTimeline">
            <div class="loading">Loading activity log...</div>
        </div>
        <div id="load-more-area" style="text-align:center;padding:16px;display:none;">
            <button class="btn btn-secondary" id="load-more-btn" onclick="loadMore()">Load More</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let actPage = 1;
const ACT_PAGE_SIZE = 20;
let actTotal = 0;

document.addEventListener('DOMContentLoaded', loadActivity);

async function loadActivity() {
    actPage = 1;
    actTotal = 0;
    document.getElementById('activityTimeline').innerHTML = '<div class="loading">Loading activity...</div>';
    document.getElementById('load-more-area').style.display = 'none';
    await fetchActivity(true);
}

async function loadMore() {
    actPage++;
    await fetchActivity(false);
}

async function fetchActivity(reset) {
    const type = document.getElementById('filter-type').value;
    const entity = document.getElementById('filter-entity').value;

    let url = `/api/v1/history?page=${actPage}&page_size=${ACT_PAGE_SIZE}`;
    if (type) url += `&action_type=${encodeURIComponent(type)}`;
    if (entity) url += `&entity_type=${encodeURIComponent(entity)}`;

    try {
        const data = await API.get(url);
        const events = Array.isArray(data) ? data : (data.items || []);
        actTotal = data.total || events.length;

        const container = document.getElementById('activityTimeline');
        if (reset) container.innerHTML = '';

        if (!events.length && reset) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">No activity recorded yet.</div>';
            document.getElementById('load-more-area').style.display = 'none';
            return;
        }

        events.forEach(ev => {
            const entry = document.createElement('div');
            entry.className = 'activity-entry';
            const icon = getEventIcon(ev.event_type || ev.action || '');
            const iconClass = (ev.event_type || '').toLowerCase();
            entry.innerHTML = `
                <div class="activity-icon ${iconClass}">${icon}</div>
                <div class="activity-header">
                    <div class="activity-title">${ev.description || ev.action || 'Event'}</div>
                    <div class="activity-time">${formatRelativeTime(ev.timestamp || ev.created_at || new Date())}</div>
                </div>
                <div class="activity-entity">${ev.entity_type ? `${ev.entity_type}: ` : ''}${ev.entity_name || ''}</div>
            `;
            container.appendChild(entry);
        });

        const shown = (actPage - 1) * ACT_PAGE_SIZE + events.length;
        const moreArea = document.getElementById('load-more-area');
        if (shown < actTotal) {
            moreArea.style.display = 'block';
        } else {
            moreArea.style.display = 'none';
        }
    } catch(e) {
        if (actPage === 1) {
            document.getElementById('activityTimeline').innerHTML =
                `<div style="text-align:center;padding:40px;color:#d9534f;">Could not load activity: ${e.message}</div>`;
        }
    }
}

function getEventIcon(type) {
    const m = { import:'📥', create:'✨', rename:'✏️', move:'📁', update:'🔄', delete:'🗑️' };
    return m[(type||'').toLowerCase()] || '◆';
}
</script>
{% endblock %}
