<!-- Top Navigation Bar -->
<div class="topbar">
    <div class="topbar-left">
        <h1 class="topbar-title">{% block page_title %}Dashboard{% endblock %}</h1>
    </div>

    <div class="topbar-right">
        <!-- Search box -->
        <input
            type="text"
            class="search-box"
            placeholder="Search academic items, courses..."
            oninput="handleGlobalSearch(this.value)"
        >

        <!-- User menu -->
        <div class="dropdown">
            <div class="topbar-icon dropdown-toggle" onclick="this.parentElement.querySelector('.dropdown-menu').classList.toggle('active')" title="Account">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="8" cy="5" r="3"/>
                    <path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
                </svg>
            </div>
            <div class="dropdown-menu">
                <a href="/settings" class="dropdown-item">Settings</a>
                <a href="/system" class="dropdown-item">System</a>
            </div>
        </div>
    </div>
</div>
