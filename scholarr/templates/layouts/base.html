<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scholarr{% endblock %} - Academic File Management</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="/static/css/scholarr.css">

    <!-- HTMX for dynamic interactions -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Additional page-specific styles -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        {% include 'partials/sidebar.html' %}

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Top Bar -->
            {% include 'partials/topbar.html' %}

            <!-- Content Area -->
            <div class="content">
                {% block content %}
                <p>Welcome to Scholarr. Select a section from the sidebar to get started.</p>
                {% endblock %}
            </div>
        </div>
    </div>

    <!-- Toast notification container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Page-specific scripts -->
    {% block extra_scripts %}{% endblock %}

    <!-- Global utilities -->
    <script>
        // ── API key ──────────────────────────────────────────────
        window.SCHOLARR_API_KEY = "{{ api_key }}";

        // ── Global fetch helpers with API key ────────────────────
        window.API = {
            headers: {
                'X-API-Key': window.SCHOLARR_API_KEY,
                'Content-Type': 'application/json'
            },
            async get(url) {
                const res = await fetch(url, { headers: { 'X-API-Key': window.SCHOLARR_API_KEY } });
                if (!res.ok) throw new Error(`GET ${url} → ${res.status}`);
                return res.json();
            },
            async post(url, data) {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: this.headers,
                    body: JSON.stringify(data)
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || `POST ${url} → ${res.status}`);
                }
                return res.json();
            },
            async put(url, data) {
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: this.headers,
                    body: JSON.stringify(data)
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || `PUT ${url} → ${res.status}`);
                }
                return res.json();
            },
            async del(url) {
                const res = await fetch(url, {
                    method: 'DELETE',
                    headers: { 'X-API-Key': window.SCHOLARR_API_KEY }
                });
                if (!res.ok) throw new Error(`DELETE ${url} → ${res.status}`);
                return res.status === 204 ? null : res.json().catch(() => null);
            },
            async postForm(url, formData) {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'X-API-Key': window.SCHOLARR_API_KEY },
                    body: formData
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || `POST ${url} → ${res.status}`);
                }
                return res.json();
            }
        };

        // ── HTMX: always send the API key header ─────────────────
        htmx.config.historyCacheSize = 0;
        document.body.addEventListener('htmx:configRequest', function(evt) {
            evt.detail.headers['X-API-Key'] = window.SCHOLARR_API_KEY;
        });

        // ── Toast notifications ───────────────────────────────────
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${message}</span><span class="toast-close">&times;</span>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
            toast.querySelector('.toast-close').addEventListener('click', () => toast.remove());
        }
        window.showToast = showToast;

        // ── HTMX toast from response headers ─────────────────────
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            const msg = evt.detail.xhr.getResponseHeader('X-Toast-Message');
            const type = evt.detail.xhr.getResponseHeader('X-Toast-Type') || 'info';
            if (msg) showToast(msg, type);
        });

        // ── Navigation active state ───────────────────────────────
        document.addEventListener('DOMContentLoaded', function() {
            const path = window.location.pathname;
            document.querySelectorAll('.nav-item').forEach(item => {
                const href = item.getAttribute('href') || item.getAttribute('data-href');
                if (!href || href === '/') {
                    if (path === '/') item.classList.add('active');
                    else item.classList.remove('active');
                } else if (href && path.startsWith(href)) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        });

        // ── Global search ─────────────────────────────────────────
        let _globalSearchTimer = null;
        window.handleGlobalSearch = function(val) {
            clearTimeout(_globalSearchTimer);
            if (!val.trim()) return;
            _globalSearchTimer = setTimeout(() => {
                window.location.href = `/academic-items?search=${encodeURIComponent(val.trim())}`;
            }, 600);
        };

        // ── HTML escape (prevent XSS in innerHTML) ────────────────
        window.esc = function(s) {
            if (s == null) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        };

        // ── Global date formatter ─────────────────────────────────
        window.formatDate = function(dateString) {
            if (!dateString) return 'N/A';
            const d = new Date(dateString + (dateString.includes('T') ? '' : 'T00:00:00'));
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        };

        window.formatRelativeTime = function(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            return date.toLocaleDateString();
        };

        // ── Global pagination renderer ─────────────────────────────
        window.renderPagination = function(total, pageSize, current, onPageFnName, containerId) {
            const pages = Math.ceil(total / pageSize);
            const el = document.getElementById(containerId);
            if (!el) return;
            if (pages <= 1) { el.innerHTML = ''; return; }
            let html = '';
            if (current > 1) html += `<button class="btn btn-secondary btn-small" onclick="${onPageFnName}(${current-1})">Prev</button>`;
            html += `<span style="padding:6px 12px;color:var(--text-secondary);font-size:0.9em;">Page ${current} of ${pages}</span>`;
            if (current < pages) html += `<button class="btn btn-secondary btn-small" onclick="${onPageFnName}(${current+1})">Next</button>`;
            el.innerHTML = html;
        };

        // ── Global keyboard helpers ────────────────────────────────
        document.addEventListener('keydown', function(e) {
            // Escape closes any visible modal
            if (e.key === 'Escape') {
                document.querySelectorAll('[id$="Modal"],[id$="-modal"]').forEach(m => {
                    if (m.style.display === 'flex' || m.classList.contains('show')) {
                        m.style.display = 'none';
                        m.classList.remove('show');
                    }
                });
            }
        });

        // ── Async button helper (disable during operation) ─────────
        window.asyncBtn = async function(btn, fn) {
            if (!btn || btn.disabled) return;
            const origText = btn.textContent;
            btn.disabled = true;
            btn.style.opacity = '0.6';
            try {
                await fn();
            } finally {
                btn.disabled = false;
                btn.style.opacity = '';
                btn.textContent = origText;
            }
        };
    </script>
</body>
</html>
